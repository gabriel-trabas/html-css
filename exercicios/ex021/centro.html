<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>centro</title>
    <style>
        #principal{
           
            position: relative;
            background-color: green;
            width: 600px;
            height: 94vh;
            margin: auto;
            border: 1px solid black;
        }
        #conteudo{
            position: absolute;
            background-color: red;
            width: 300px;
            height: 300px;
            top: 50%;
            left:50%;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>
    <article id="principal">
        <aside id="conteudo">

        </aside>
    </article>
</body>
</html>
