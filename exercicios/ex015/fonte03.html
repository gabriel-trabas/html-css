<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alinhamento de fontes</title>
    <style>
        body{
            font: normal 16px
            arial, sans-serif;
            text-align: left;
            
        }
        h1{
            text-align: center;
        }
        h2{
            text-align: right;
        }
        p
        {
            text-align: justify;
            text-indent: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <h2>Subtítulo</h2>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ut eius, omnis at, fugit saepe ducimus totam eveniet corrupti recusandae dignissimos laboriosam quasi libero animi pariatur distinctio cupiditate. Dolorum, atque cumque?</p>
    
</body>
</html>
