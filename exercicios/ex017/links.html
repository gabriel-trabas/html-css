<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children 
        */

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:visited{
            color: darkred;
        }
        a:active{
            color:yellowgreen;
        }
        .especial{
            background-color: rgba(240, 128, 128, 0.356);
            width: fit-content;
        }
        .especial::before{
            content: '🗿';
        }
        .especial::after{
            content: '🗿';
        }
        a:hover::before{
            content: '👻';
        }
        
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li class="especial"><a href="https://github.com/gabriel-trabas" target="_blank">Repertorio Github</a></li>
        <li><a href="https://youtube.com.br" target="_blank">canal YT</a></li>
        <li><a href="https://www.bluenett.com.br" target="_blank">Site pessoal</a></li>
    </ul>
</body>
</html>
