<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragráfos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Este é um parágrafo, ele pode conter várias linhas. E o que eu quiser</p>
    <p>Este é outro parágrafo, ele também pode conter várias linhas. &lt;br&gt;   <br> &lt;br&gt; E o que eu quiser 
        
</p> 
<p> vamos adicionar alguns caracteres especiais: <br>&cent;
    &trade;
    &real;
    &hearts;
    &smile;
    &hearts;</p>
    <p>vamos adicionar alguns emojis <br>
        &#x1FAE8
        &#x1F925
        &#x1F600
    </p>
    
    <!-- &lt significa less than, ou seja, menor que. O &gt significa greater than, ou seja, maior que. -->
     
</body>
</html>
