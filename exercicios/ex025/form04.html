<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário email-telefone</title>
</head>
<body>
    <h1>formulário email-telefone</h1>
<form action="cadastro.php" method="get" autocomplete="on">
    <fieldset>
        <legend>Dados pessoais</legend>
        <p>
            <label for="iemail"> E-mail</label>
            <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="blabla@gmailbla.com">
        </p>
        <p>
            <label for="itel">Telefone</label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" required placeholder="(xx)xxxxx-xxxx"
            pattern="^\(\d{2}\)\d{4,5}-\d{4}$">
        
        </p>
        <p><input type="submit" value="Enviar">
       <input type="reset" value="Limpar">
    </p>
    </fieldset>
</form>
    
</body>
</html>
