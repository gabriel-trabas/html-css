<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário prova</title>
</head>
<body>
    <h1>Testando formulário 	&#x1F61C  </h1>
    <form action="cadastro.php" method="post">

        <p><label for="iname">nome</label>
            <input type="text" name="name" id="iname" placeholder="nome completo" required>
        </p>
        <p><label for="media">Média</label>
        <input type="number" name="media" id="imedia" min="0" max="10" placeholder="0 a 10" step="0.1" required>
        <p>
            <label for="iperiodo">periodo letivo</label>
            <input type="month" name="periodo" id="iperiodo" required value="2026-08">


        </p>
        </p>
        <p>
            <label for="idia">dia da prova</label>
            <input type="date" name="dia" id="idia" required value="2026-08-10">
        </p>
        <p>
            <label for="ihora"> Horário da prova </label>
            <input type="time" name="hora" id="ihora">
            
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
